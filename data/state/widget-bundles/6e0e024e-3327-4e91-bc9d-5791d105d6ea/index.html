<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fleet Health Visualization</title>
    <link rel="stylesheet" href="/generated/widgets/6e0e024e-3327-4e91-bc9d-5791d105d6ea/files/styles.css">
  </head>
  <body>
    <div id="app"><div class="widget-shell">
  <div class="widget-content">
    <div class="header-row">
      <div class="icon-badge" data-icon></div>
      <div class="header-text">
        <div class="domain-name" data-domain></div>
        <div class="panel-title" data-title></div>
      </div>
    </div>
    <div class="section summary-grid">
      <div class="summary card">
        <div class="card-heading">Fleet overview</div>
        <div class="card-body" data-summary></div>
      </div>
      <div class="key-metrics card">
        <div class="card-heading">Key metrics</div>
        <div class="metric">
          <div class="label">Preview interval</div>
          <div class="value" data-range></div>
        </div>
        <div class="metric">
          <div class="label">Instrumented hosts</div>
          <div class="value" data-hosts></div>
        </div>
        <div class="metric">
          <div class="label">Pending demand</div>
          <div class="value" data-partitions></div>
        </div>
      </div>
    </div>
    <div class="chart card">
      <div class="card-heading">Risk distribution</div>
      <div class="chart-title" data-chart-title></div>
      <div class="chart-bars" data-chart></div>
    </div>
    <div class="highlights card">
      <div class="card-heading">Highlights</div>
      <div class="card-body" data-highlights></div>
    </div>
  </div>
</div></div>
    <script src="/runtime/widget-bridge.js"></script>
    <script type="module" src="/generated/widgets/6e0e024e-3327-4e91-bc9d-5791d105d6ea/files/widget.js"></script>
  </body>
</html>
